# Story as Code – Format Schema
# Item schema for narrative.formats[] — defines the output container.
# Formats are purely about presentation: medium, structure hierarchy, and delivery settings.
# They have NO content relevance — what is told is determined by arcs and lenses, not formats.
# Can be embedded inline in story.yaml or referenced via $ref.
# Spec Version: 0.4.0

$schema: "https://story-as-code.dev/schemas/v0.4.0/format.schema.yaml"
type: object
description: >
  Output format definition — determines ONLY how content is structured and delivered.
  Formats have no content relevance. They do not influence what is told,
  only the structural container in which it appears.
  The schema defines the shape — concrete output types, structure levels,
  and their constraints are defined by the user, not prescribed by the schema.
required:
  - id
  - type
  - structure

properties:
  id:
    type: string
    description: "Unique format identifier"

  name:
    type: string
    description: "Human-readable format name"

  structure:
    $ref: "#/$defs/Structure"

  settings:
    type: object
    description: >
      Type-specific settings as free-form key-value pairs.
      The schema does not prescribe which keys are valid —
      that depends on the output type and tooling.

$defs:
  Structure:
    type: object
    description: >
      Recursive structural level. Hierarchy is expressed via children
      (e.g. book → chapter → scene, or issue → page → panel).
    required:
      - type
    properties:
      type:
        type: string
        description: >
          Structural level identifier (e.g. 'book', 'chapter', 'scene',
          'page', 'panel', 'segment'). Free-form — not prescribed by the schema.
      constraints:
        type: object
        description: >
          Free-form constraints for this level (e.g. word count ranges,
          panel counts, duration limits).
      children:
        $ref: "#/$defs/Structure"
