# Story as Code – Beat Schema
# Item schema for narrative.beats[] — hierarchical narrative building blocks.
# Beats select world graph elements and add dramaturgical structure.
# Parent beats provide vertical chaining (storyline hierarchy).
# Threads provide horizontal chaining (cross-storyline thematic connections).
# Can be embedded inline in story.yaml or referenced via $ref.
# Spec Version: 0.4.0

$schema: "https://story-as-code.dev/schemas/v0.4.0/beat.schema.yaml"
type: object
description: >
  A story beat — the fundamental narrative building block. Beats select world graph elements
  and add dramaturgical structure (function, tension, reveals). They form hierarchies via
  parent references: a top-level beat without parent acts as a storyline container (what was
  previously an "arc"), while child beats represent individual story moments within that
  storyline. Vertical chaining (parent) groups beats within a storyline; horizontal chaining
  (threads) connects beats across storylines by shared thematic meaning.
required:
  - id
  - name

properties:
  id:
    type: string
    description: "Unique beat identifier"

  name:
    type: string
    description: "Human-readable beat name"

  description:
    type: string
    description: "What happens in this beat or what this storyline covers"

  # --- Vertical chaining (hierarchy within a storyline) ---
  parent:
    type: string
    description: >
      ID of parent beat — vertical chaining within a storyline
      (e.g. main plot > subplots > scenes). A beat without parent is a top-level storyline.

  # --- World references (WAS) ---
  node_ids:
    type: array
    items:
      type: string
    description: "Node IDs from the world graph relevant to this beat"

  edge_ids:
    type: array
    items:
      type: string
    description: "Edge IDs from the world graph relevant to this beat"

  # --- Dramaturgy (WIE) ---
  function:
    type: string
    enum:
      - HOOK
      - INCITING_INCIDENT
      - RISING_ACTION
      - FIRST_THRESHOLD
      - PINCH_POINT
      - MIDPOINT
      - CRISIS
      - CLIMAX
      - RESOLUTION
      - DENOUEMENT
      - CUSTOM
    description: >
      Dramaturgical function of this beat. All dramaturgical properties (function,
      reveals, tension, emotional_target, transition) are optional — a beat with
      only id, name, and world references is valid.

  reveals:
    type: array
    items:
      type: object
      required:
        - target
      properties:
        target:
          type: string
          description: "Node or edge ID being revealed to the reader"
        degree:
          type: string
          enum: [HINT, PARTIAL, FULL]
          default: FULL
          description: "How much is disclosed"
    description: "Information disclosed to the reader at this beat"

  tension:
    type: number
    minimum: 0.0
    maximum: 1.0
    description: "Tension level at this beat (for tension curve modeling)"

  emotional_target:
    type: number
    minimum: -1.0
    maximum: 1.0
    description: "Target emotional valence at this beat"

  transition:
    type: object
    properties:
      type:
        type: string
        enum: [CUT, FADE, CLIFFHANGER, TIME_SKIP, CONTINUATION]
        description: "How this beat connects to the next"
      to_beat:
        type: string
        description: "Beat ID this transitions to (if cross-hierarchy)"

examples:
  - id: main-storyline
    name: "The Hero's Journey"
    node_ids: [hero, mentor, villain, kingdom]
    edge_ids: [hero-meets-mentor, hero-defeats-villain]
  - id: the-call
    name: "The Call to Adventure"
    parent: main-storyline
    node_ids: [hero, mentor]
    edge_ids: [hero-meets-mentor]
    function: INCITING_INCIDENT
    tension: 0.4
    reveals:
      - target: mentor
        degree: PARTIAL
    transition:
      type: CLIFFHANGER
