# Story as Code – Derivation Meta Schema
# Defines the structure of .meta.yaml files (validation contracts).
# Derivation meta files are produced alongside compiled outputs, not embedded in world.yaml.
# Spec Version: 0.2.0

$schema: "https://story-as-code.dev/schemas/v0.2.0/derivation-meta.schema.yaml"
type: object
description: "Validation contract for a compiled output — links lens, format, and arc back to the world graph state."
required:
  - id
  - lens
  - format
  - dependencies

properties:
  id:
    type: string
    description: "Derivation identifier"

  source_version:
    type: string
    description: "Version or identifier of the graph state used for this derivation"

  lens:
    type: string
    description: "Lens ID used"

  format:
    type: string
    description: "Format ID used"

  arc_position:
    type: object
    properties:
      arc:
        type: string
        description: "Arc ID"
      milestone:
        type: string
        description: "Milestone ID"
      progress:
        type: number
        minimum: 0.0
        maximum: 1.0

  dependencies:
    type: object
    properties:
      nodes:
        type: array
        items:
          $ref: "#/$defs/NodeDependency"
      edges:
        type: array
        items:
          $ref: "#/$defs/EdgeDependency"
      reveals:
        type: array
        items:
          $ref: "#/$defs/RevealDependency"

$defs:
  NodeDependency:
    type: object
    required:
      - id
      - must_exist
    properties:
      id:
        type: string
      must_exist:
        type: boolean
      required_state:
        type: object
        properties:
          at:
            type: object
            properties:
              frame:
                type: string
                description: "Frame ID. Omit = all frames"
              time:
                type: string
                description: "Time point. Format depends on the world's time_system"
          properties:
            type: object
            additionalProperties: true

  EdgeDependency:
    type: object
    required:
      - id
      - must_exist
    properties:
      id:
        type: string
      must_exist:
        type: boolean
      required:
        type: object
        additionalProperties: true

  RevealDependency:
    type: object
    properties:
      node:
        type: string
      revealed_to:
        type: string
      at:
        type: string
        description: "Time point of the reveal"
