# Story as Code – Derivation Meta Schema
# Defines the structure of .meta.yaml files (validation contracts).
# Derivation meta files are produced alongside compiled outputs, not embedded in world.yaml.
# Spec Version: 0.1.0

$schema: "https://story-as-code.dev/schemas/v0.1.0/derivation-meta.schema.yaml"
type: object
required:
  - id
  - lens
  - format
  - dependencies

properties:
  id:
    type: string
    description: "Derivation identifier"

  source_version:
    type: string
    description: "Version or identifier of the graph state used for this derivation"

  lens:
    type: string
    pattern: "^lens_"
    description: "Lens ID used"

  format:
    type: string
    pattern: "^fmt_"
    description: "Format ID used"

  arc_position:
    type: object
    properties:
      arc:
        type: string
        pattern: "^arc_"
      milestone:
        type: string
        pattern: "^ms_"
      progress:
        type: number
        minimum: 0.0
        maximum: 1.0

  dependencies:
    type: object
    properties:
      nodes:
        type: array
        items:
          $ref: "#/$defs/NodeDependency"
      edges:
        type: array
        items:
          $ref: "#/$defs/EdgeDependency"
      reveals:
        type: array
        items:
          $ref: "#/$defs/RevealDependency"

$defs:
  NodeDependency:
    type: object
    required:
      - id
      - must_exist
    properties:
      id:
        type: string
      must_exist:
        type: boolean
      required_state:
        type: object
        properties:
          at:
            type: object
            properties:
              frame:
                type: string
              T:
                type: integer
          properties:
            type: object
            additionalProperties: true

  EdgeDependency:
    type: object
    required:
      - id
      - must_exist
    properties:
      id:
        type: string
      must_exist:
        type: boolean
      required:
        type: object
        additionalProperties: true

  RevealDependency:
    type: object
    properties:
      node:
        type: string
      revealed_to:
        type: string
      at:
        type: string
        pattern: "^T\\d+$"
