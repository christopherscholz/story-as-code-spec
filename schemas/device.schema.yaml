# Story as Code – Narrative Device Schema
# Item schema for narrative.devices[] — rhetorical connections between beats.
# Devices describe narrative techniques (foreshadowing, red herrings, etc.) that link
# beats to each other. They reference only beat IDs, not nodes/edges (beats already do that).
# Can be embedded inline in story.yaml or referenced via $ref.
# Spec Version: 0.4.0

$schema: "https://story-as-code.dev/schemas/v0.4.0/device.schema.yaml"
type: object
description: >
  A narrative device — a rhetorical technique connecting beats to each other.
  Devices describe how the author arranges information for effect (foreshadowing,
  red herrings, setup/payoff, etc.). They reference beat IDs only — node and edge
  references live on the beats themselves.
required:
  - id
  - type
  - setup

properties:
  id:
    type: string
    description: "Unique device identifier"

  type:
    type: string
    enum:
      - FORESHADOWING
      - RED_HERRING
      - SETUP_PAYOFF
      - DRAMATIC_IRONY
      - ECHO
      - CONTRAST
      - PARALLEL
      - CALLBACK
      - CHEKHOV_GUN
      - CUSTOM
    description: "Type of narrative device"

  description:
    type: string
    description: "What this device achieves narratively"

  setup:
    type: array
    items:
      type: string
    description: "Beat IDs where the device is planted"

  payoff:
    type: array
    items:
      type: string
    description: "Beat IDs where it resolves"

  tags:
    type: array
    items:
      type: string
    description: "Free-form tags for filtering and organization"

examples:
  - id: journal-setup-payoff
    type: SETUP_PAYOFF
    description: "The journal found in the cave pays off when used to confront Elara."
    setup:
      - cave-found
    payoff:
      - truth-revealed
  - id: elara-red-herring
    type: RED_HERRING
    description: "Elara's mysterious behavior suggests danger but is actually protectiveness."
    setup:
      - stranger-arrives
    payoff:
      - truth-revealed
