# Story as Code – Story Schema
# Root document schema. A story.yaml is the composable root of a Story as Code project.
# It separates into two layers: world (graph structure) and narrative (storytelling).
# Items can be defined inline or referenced via $ref (like OpenAPI).
# Spec Version: 0.4.0

$schema: "https://story-as-code.dev/schemas/v0.4.0/story.schema.yaml"
type: object
description: >
  Root document of a Story as Code project.
  Composes world (the ground truth — what exists) and narrative (the storytelling perspective — how it is told).
  The narrative layer never defines its own truth; it only selects, filters, and presents world layer content.
required:
  - spec_version
  - name
  - world

properties:
  spec_version:
    type: string
    pattern: "^\\d+\\.\\d+\\.\\d+$"
    description: "Semantic version of the Story as Code spec this story conforms to"
    examples: ["0.4.0"]

  name:
    type: string
    description: "Human-readable name of the story"
    examples: ["My Story", "An Epic Saga"]

  settings:
    type: object
    properties:
      default_language:
        type: string
        description: "ISO 639-1 language code"
        examples: ["en", "de"]

  # --- World Layer (ground truth: what exists) ---
  world:
    $ref: "world.schema.yaml"

  # --- Narrative Layer (storytelling perspective: how the world is told — defines no own truth) ---
  narrative:
    $ref: "narrative.schema.yaml"

examples:
  - spec_version: "0.4.0"
    name: "My Story"
    world:
      time_system:
        id: earth-time
        type: LINEAR
        epoch: "Year 0"
      nodes:
        - id: hero
          type: CHARACTER
          static:
            name_variants: ["The Hero"]
      edges:
        - id: hero-in-village
          type: SPATIAL
          name: located-in
          source: hero
          target: village
    narrative:
      lenses:
        - id: omniscient
          perspective:
            type: OMNISCIENT
      beats:
        - id: main-storyline
          name: "The Hero's Journey"
