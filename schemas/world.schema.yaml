# Story as Code – World Schema
# Sub-object schema for story.world — the ground truth of the story universe.
# Everything that exists — entities, relationships, timelines, rules — is defined here.
# The world layer is the single source of truth. The narrative layer only references it.
# Contains nodes, edges, frames, constraints, and the time system.
# Spec Version: 0.2.0

$schema: "https://story-as-code.dev/schemas/v0.2.0/world.schema.yaml"
type: object
description: >
  The world graph — the ground truth of the story universe.
  Defines what exists: entities (nodes), relationships (edges), timelines (frames),
  rules (constraints), and the time system. All facts live here.
  The narrative layer references world content but never defines its own truth.

properties:
  time_system:
    $ref: "time-system.schema.yaml"

  nodes:
    type: array
    items:
      $ref: "node.schema.yaml"
    description: "All nodes in this world"

  edges:
    type: array
    items:
      $ref: "edge.schema.yaml"
    description: "All edges (relationships) between nodes"

  frames:
    type: array
    items:
      $ref: "frame.schema.yaml"
    description: >
      Temporal frame definitions. An implicit default frame always exists.
      If no frames are defined, all temporal data belongs to the default frame.

  constraints:
    type: array
    items:
      $ref: "constraint.schema.yaml"
    description: "World rules and validation constraints"
