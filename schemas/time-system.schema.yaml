# Story as Code – Time System Schema
# Item schema for world.time_system — defines how time works in this world.
# Can be embedded inline in story.yaml or referenced via $ref.
# Spec Version: 0.2.0

$schema: "https://story-as-code.dev/schemas/v0.2.0/time-system.schema.yaml"
type: object
description: "Defines how time works in this world — its structure, epoch, and calendar."
required:
  - id

properties:
  id:
    type: string
    description: "Unique time system identifier"

  name:
    type: string
    description: "Human-readable name (e.g., 'Galactic Calendar', 'Earth Time')"

  type:
    type: string
    enum:
      - LINEAR
      - ABSTRACT
    description: >
      The fundamental nature of time points in this world.
      LINEAR — time points have a natural order; "earlier" and "later" are defined.
      ABSTRACT — time points are labels without inherent ordering; relationships between moments are defined through the graph.

  epoch:
    type: string
    description: "Label for the origin/starting point of time (e.g., 'Year 0', 'The Founding')"

  calendar:
    type: object
    description: "Calendar structure — freely definable (months, cycles, seasons, etc.)"
    additionalProperties: true

  properties:
    type: object
    description: "Additional world-specific time properties"
    additionalProperties: true
