# Story as Code – Variant Metadata Schema
# Item schema for world.variants[] — defines parallel world version metadata.
# Can be embedded inline in world.yaml or referenced via $ref.
# Spec Version: 0.1.0

$schema: "https://story-as-code.dev/schemas/v0.1.0/variant-meta.schema.yaml"
type: object
required:
  - type

properties:
  type:
    type: string
    enum:
      - CANON
      - SPECULATIVE
      - RETCON
      - FORK
      - COLLAB
    description: >
      CANON: Primary version, the accepted truth.
      SPECULATIVE: "What if" exploration.
      RETCON: Retroactive change to established canon.
      FORK: Independent version by another author.
      COLLAB: Collaborator working on a section.

  parent_variant:
    type: string
    description: "Identifier of the variant this one diverged from"

  description:
    type: string
    description: "Human-readable description of this variant's purpose"

  affects_frames:
    type: array
    items:
      type: string
      pattern: "^frame_"
    description: "Temporal frames affected by this variant"

  merge_strategy:
    type: string
    enum:
      - PICK_A
      - PICK_B
      - FORK_FRAME
      - MANUAL
    description: "Preferred conflict resolution strategy"
