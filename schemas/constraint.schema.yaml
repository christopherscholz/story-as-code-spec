# Story as Code – Constraint Schema
# Item schema for world.constraints[] — defines world rules and validation.
# Can be embedded inline in world.yaml or referenced via $ref.
# Spec Version: 0.1.0

$schema: "https://story-as-code.dev/schemas/v0.1.0/constraint.schema.yaml"
type: object
required:
  - id
  - name
  - rule
  - severity

properties:
  id:
    type: string
    description: "Unique constraint identifier"

  name:
    type: string
    description: "Human-readable rule name"

  schema:
    type: string
    description: "Schema ID this constraint belongs to"

  rule:
    type: string
    description: >
      Constraint expression using the declarative query language.
      Syntax: FOR node IN nodes WHERE condition: assertion
      Supports: COUNT, edges, nodes, GROUP BY, comparison operators

  severity:
    type: string
    enum:
      - ERROR
      - WARNING
      - INFO
    description: >
      ERROR: blocks commit.
      WARNING: flags issue but allows commit.
      INFO: suggestion only.

  on_violation:
    type: string
    description: "Human-readable message template for violations. Supports {node.name}, {count} placeholders."
