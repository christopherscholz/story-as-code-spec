# Story as Code – Story Arc Schema
# Item schema for narrative.arcs[] — groups related world graph elements of a storyline.
# Arcs define which nodes and edges belong together for a particular storyline, not how it is told.
# Can be embedded inline in story.yaml or referenced via $ref.
# Spec Version: 0.3.0

$schema: "https://story-as-code.dev/schemas/v0.3.0/arc.schema.yaml"
type: object
description: >
  A story arc — groups related world graph elements (nodes and edges) of a storyline,
  optionally structured into beats. Arcs define which parts of the world belong together
  for a particular storyline, not how it is told.
required:
  - id
  - name

properties:
  id:
    type: string
    description: "Unique arc identifier"

  name:
    type: string
    description: "Human-readable arc name"

  description:
    type: string
    description: "Brief synopsis of this arc"

  parent_arc:
    type: string
    description: "ID of a parent arc for storyline hierarchy (e.g., main plot containing subplots)"

  node_ids:
    type: array
    items:
      type: string
    description: "Node IDs from the world graph that belong to this arc"

  edge_ids:
    type: array
    items:
      type: string
    description: "Edge IDs from the world graph that belong to this arc"

  tags:
    type: array
    items:
      type: string
    description: "Free-form tags for filtering and organization"

  beats:
    type: array
    items:
      $ref: "#/$defs/Beat"
    description: "Optional ordered sequence of story beats within this arc"

$defs:
  Beat:
    type: object
    required:
      - id
      - name
    properties:
      id:
        type: string
        description: "Unique beat identifier within the arc"
      name:
        type: string
        description: "Human-readable beat name"
      description:
        type: string
        description: "What happens in this beat"
      node_ids:
        type: array
        items:
          type: string
        description: "Node IDs relevant to this specific beat (subset of arc's nodes)"
      edge_ids:
        type: array
        items:
          type: string
        description: "Edge IDs relevant to this specific beat (subset of arc's edges)"
