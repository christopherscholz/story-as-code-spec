# Story as Code – Schema Definition Schema
# Item schema for world.schemas[] — defines user/community type extensions.
# Can be embedded inline in world.yaml or referenced via $ref.
# Spec Version: 0.1.0

$schema: "https://story-as-code.dev/schemas/v0.1.0/schema.schema.yaml"
type: object
required:
  - id
  - name
  - version
  - source

properties:
  id:
    type: string
    description: "Unique schema identifier"

  name:
    type: string
    description: "Human-readable name"

  version:
    type: integer
    minimum: 1
    description: "Schema version (incremented on changes)"

  source:
    type: string
    enum:
      - BUILTIN
      - COMMUNITY
      - USER_DEFINED
    description: "Origin of the schema"

  maturity:
    type: string
    enum:
      - IMPLICIT
      - SKETCH
      - STRUCTURED
      - RIGOROUS
    default: SKETCH
    description: "Maturity level determining validation strictness"

  depends_on:
    type: array
    items:
      type: string
    description: "Other schema IDs this one requires"

  node_types:
    type: object
    description: "New node type definitions"
    additionalProperties:
      $ref: "#/$defs/TypeDefinition"

  edge_types:
    type: object
    description: "New edge type definitions"
    additionalProperties:
      $ref: "#/$defs/EdgeTypeDefinition"

$defs:
  TypeDefinition:
    type: object
    properties:
      description:
        type: string
      properties:
        type: object
        additionalProperties:
          $ref: "#/$defs/PropertyDefinition"

  EdgeTypeDefinition:
    type: object
    properties:
      description:
        type: string
      source_type:
        type: string
        description: "Allowed source node type"
      target_type:
        type: string
        description: "Allowed target node type"
      properties:
        type: object
        additionalProperties:
          $ref: "#/$defs/PropertyDefinition"

  PropertyDefinition:
    type: object
    required:
      - type
    properties:
      type:
        type: string
        description: >
          Property type. Supported values:
          STRING, INTEGER, FLOAT, BOOLEAN,
          ENUM[value1, value2, ...],
          LIST<T>, REFERENCE, TEMPORAL, VECTOR, OBJECT
      default:
        description: "Default value for this property"
      description:
        type: string
      required:
        type: boolean
        default: false
