# Story as Code – Edge Schema
# Item schema for world.edges[] — defines relationships between nodes.
# Can be embedded inline in story.yaml or referenced via $ref.
# Spec Version: 0.3.0

$schema: "https://story-as-code.dev/schemas/v0.3.0/edge.schema.yaml"
type: object
description: "A relationship between two nodes — with optional temporal validity and knowledge restrictions."
required:
  - id
  - type
  - source
  - target

properties:
  id:
    type: string
    description: "Unique edge identifier"

  type:
    type: string
    description: "Edge type (e.g., RELATIONSHIP, ACTION). Free-form; constrained by type masks at tooling level"

  subtype:
    type: string
    description: "Specific relationship subtype. Subtypes are defined by the edge_type's schema"

  source:
    type: string
    description: "Source node ID"

  target:
    type: string
    description: "Target node ID"

  directed:
    type: boolean
    default: true
    description: "Whether the edge is directed. When false, the edge is symmetric — traversable equally in both directions (e.g., adjacency, friendship, kinship)"

  valid_in:
    type: array
    items:
      $ref: "#/$defs/TemporalScope"
    description: "When this edge exists. Omit entirely = always valid in all frames"

  properties:
    type: object
    description: "Weight, emotional valence, cause, etc."
    additionalProperties: true
    properties:
      weight:
        type: number
        minimum: 0.0
        maximum: 1.0
      emotional:
        type: object
        properties:
          valence:
            type: number
            minimum: -1.0
            maximum: 1.0
          arousal:
            type: number
            minimum: 0.0
            maximum: 1.0
      cause:
        type: string
        description: "Node ID of the event that caused this edge"

  known_by:
    type: array
    items:
      type: string
    description: "Character node IDs that know about this edge. Empty = public knowledge"

$defs:
  TemporalScope:
    type: object
    properties:
      frame:
        type: string
        description: "Frame ID. Omit = all frames"
      from:
        type: string
        description: "Start time point. Omit = since the beginning"
      to:
        type: string
        description: "End time point. Omit = still active / ongoing"

