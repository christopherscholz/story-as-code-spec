# Story as Code – Edge Schema
# Item schema for world.edges[] — defines relationships between nodes.
# Can be embedded inline in story.yaml or referenced via $ref.
# Spec Version: 0.4.0

$schema: "https://story-as-code.dev/schemas/v0.4.0/edge.schema.yaml"
type: object
description: "A relationship between two nodes — with optional temporal validity and knowledge restrictions."
required:
  - id
  - type
  - name
  - source
  - target

properties:
  id:
    type: string
    description: "Unique edge identifier"
    examples: ["hero-in-village", "hero-loves-companion"]

  type:
    type: string
    description: "Category (e.g., SPATIAL, KINSHIP, CONFLICT)"
    examples: ["SPATIAL", "KINSHIP", "CONFLICT", "RELATIONSHIP", "KNOWLEDGE"]

  name:
    type: string
    description: "Verb describing the relationship (e.g., mentors, owns, borders)"
    examples: ["mentors", "owns", "borders", "loves", "located-in"]

  description:
    type: string
    description: "Optional prose summary (e.g., 'Elena mentors Kai in secret')"

  source:
    type: string
    description: "Source node ID"

  target:
    type: string
    description: "Target node ID"

  directed:
    type: boolean
    default: false
    description: >
      Whether edge is directed. Default false (symmetric/undirected).
      Set to true for one-way relationships (source → target).
      Undirected edges are traversable in both directions — a single edge
      replaces two mirrored directed edges.

  valid_in:
    type: array
    description: >
      When and where this edge exists. Omit = always valid in all frames.
      Each entry scopes the edge to a specific frame and/or time range.
    items:
      type: object
      properties:
        frame:
          type: string
          description: "Frame ID. Omit = all frames"
        from:
          type: string
          description: "Start time point. Omit = since the beginning"
        to:
          type: string
          description: "End time point. Omit = still active"

  weight:
    type: number
    minimum: 0
    maximum: 5
    description: "Strength of the relationship"

examples:
  - id: cave-adjacent-lighthouse
    type: SPATIAL
    name: adjacent-to
    source: hidden-cave
    target: lighthouse
    directed: false
  - id: hero-visits-dungeon
    type: SPATIAL
    name: visits
    source: hero
    target: dungeon
    directed: true
    valid_in:
      - from: "T10"
        to: "T15"
  - id: hero-has-sword
    type: SPATIAL
    name: possesses
    source: hero
    target: magic-sword
    valid_in:
      - frame: alt-timeline
        from: "T5"
