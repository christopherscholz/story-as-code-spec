# Story as Code – Narrative Schema
# Sub-object schema for story.narrative — defines how the world is told.
# Contains lenses, formats, arcs, and variants.
# Spec Version: 0.2.0

$schema: "https://story-as-code.dev/schemas/v0.2.0/narrative.schema.yaml"
type: object
description: "The narrative layer — defines how the world is told: perspective, structure, format, and variants."

properties:
  lenses:
    type: array
    items:
      $ref: "lens.schema.yaml"
    description: "Narrative perspective configurations"

  formats:
    type: array
    items:
      $ref: "format.schema.yaml"
    description: "Output format definitions"

  arcs:
    type: array
    items:
      $ref: "arc.schema.yaml"
    description: "Story arc definitions"

  variants:
    type: array
    items:
      $ref: "variant-meta.schema.yaml"
    description: "Parallel world version metadata"
