# Story as Code – Narrative Schema
# Sub-object schema for story.narrative — the storytelling perspective.
# Defines how the world is told, not what is true.
# The narrative layer never creates its own truth — it only selects, filters, and presents
# content from the world layer.
# Contains lenses (perspective), formats (output container), beats (dramaturgical structure),
# devices (narrative techniques), threads (thematic connections), and variants.
# Spec Version: 0.4.0

$schema: "https://story-as-code.dev/schemas/v0.4.0/narrative.schema.yaml"
type: object
description: >
  The narrative layer — defines how the world is told: perspective, selection, and presentation.
  The narrative layer does not define its own truth. All facts live in the world layer.
  Narrative schemas only select, filter, and arrange world content for storytelling.

properties:
  lenses:
    type: array
    items:
      $ref: "lens.schema.yaml"
    description: "Narrative perspectives — filter and interpret world content (define no own truth)"

  formats:
    type: array
    items:
      $ref: "format.schema.yaml"
    description: "Output format definitions — purely about presentation, no content relevance"

  beats:
    type: array
    items:
      $ref: "beat.schema.yaml"
    description: >
      Story beats — hierarchical narrative building blocks. Beats select world graph elements
      and add dramaturgical structure. Vertical chaining via parent groups beats within a
      storyline; horizontal chaining via threads connects beats across storylines.

  devices:
    type: array
    items:
      $ref: "device.schema.yaml"
    description: "Narrative devices — rhetorical connections between beats (foreshadowing, red herrings, etc.)"

  threads:
    type: array
    items:
      $ref: "thread.schema.yaml"
    description: >
      Thematic threads and motifs — horizontal chaining of beats across the storyline hierarchy.
      Connect beats from different storylines through shared thematic meaning.

  variants:
    type: array
    items:
      $ref: "variant-meta.schema.yaml"
    description: "Parallel world version metadata"
