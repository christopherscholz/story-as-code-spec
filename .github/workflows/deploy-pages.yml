name: Deploy Docs to GitHub Pages

on:
  push:
    tags: ['v*']
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate schema reference docs
        run: bash scripts/generate-schema-docs.sh

      - name: Configure git for mike
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch gh-pages branch
        run: git fetch origin gh-pages:gh-pages || true

      - name: Determine version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "alias=latest" >> "$GITHUB_OUTPUT"
            echo "is_tag=true" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev" >> "$GITHUB_OUTPUT"
            echo "alias=" >> "$GITHUB_OUTPUT"
            echo "is_tag=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy versioned docs with mike
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ALIAS="${{ steps.version.outputs.alias }}"

          if [ -n "$ALIAS" ]; then
            mike deploy --push --update-aliases "$VERSION" "$ALIAS"
            mike set-default --push latest
          else
            mike deploy --push "$VERSION"
            # Set dev as default if no latest version exists yet
            if ! mike list | grep -q '\[latest\]'; then
              mike set-default --push dev
            fi
          fi

      - name: Ensure CNAME on gh-pages
        run: |
          git fetch origin gh-pages
          git worktree add /tmp/gh-pages-cname origin/gh-pages
          if [ ! -f /tmp/gh-pages-cname/CNAME ]; then
            cp docs/CNAME /tmp/gh-pages-cname/CNAME
            cd /tmp/gh-pages-cname
            git add CNAME
            git commit -m "Add CNAME for custom domain"
            git push origin HEAD:gh-pages
          fi
          git worktree remove /tmp/gh-pages-cname

      - name: Add schemas to gh-pages
        if: steps.version.outputs.is_tag == 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          git fetch origin gh-pages
          git worktree add /tmp/gh-pages origin/gh-pages

          mkdir -p "/tmp/gh-pages/schemas/v${VERSION}"
          cp schemas/*.schema.yaml "/tmp/gh-pages/schemas/v${VERSION}/"

          cd /tmp/gh-pages
          git add "schemas/v${VERSION}/"
          git commit -m "Add raw schemas for v${VERSION}"
          git push origin HEAD:gh-pages
