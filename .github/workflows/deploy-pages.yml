name: Deploy Docs to GitHub Pages

on:
  push:
    tags: ['v*']
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure git for mike
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "alias=latest" >> "$GITHUB_OUTPUT"
            echo "is_tag=true" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev" >> "$GITHUB_OUTPUT"
            echo "alias=" >> "$GITHUB_OUTPUT"
            echo "is_tag=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy versioned docs with mike
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ALIAS="${{ steps.version.outputs.alias }}"

          MIKE_OPTS="--push --ignore-remote-status"

          if [ -n "$ALIAS" ]; then
            mike deploy $MIKE_OPTS --update-aliases "$VERSION" "$ALIAS"
            mike set-default $MIKE_OPTS latest
          else
            mike deploy $MIKE_OPTS "$VERSION"
            # Set dev as default if no latest version exists yet
            if ! mike list | grep -q '\[latest\]'; then
              mike set-default $MIKE_OPTS dev
            fi
          fi

      - name: Add schemas to gh-pages
        if: steps.version.outputs.is_tag == 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          mkdir -p /tmp/schemas
          cp schemas/*.schema.yaml /tmp/schemas/

          git checkout gh-pages

          mkdir -p "schemas/v${VERSION}"
          cp /tmp/schemas/*.schema.yaml "schemas/v${VERSION}/"

          git add "schemas/v${VERSION}/"
          git commit -m "Add raw schemas for v${VERSION}"
          git push origin gh-pages
