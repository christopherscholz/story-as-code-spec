name: Validate

on:
  pull_request:
  push:
    branches:
      - main
    paths:
      - "schemas/**"
      - "**.yaml"
      - "**.yml"
      - "VERSION"

jobs:
  yamllint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint YAML files
        run: |
          FILES=$(find . -name "*.yml" -o -name "*.yaml" | grep -v "^./.git/" | grep -v "^./site/")
          if [ -n "$FILES" ]; then
            echo "$FILES" | xargs yamllint
          fi

  version-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify example spec_versions match VERSION
        run: |
          VERSION=$(tr -d '[:space:]' < VERSION)
          echo "Expected version: $VERSION"
          ERRORS=0

          for example in examples/*/story.yaml; do
            name=$(echo "$example" | cut -d/ -f2)
            actual=$(grep -oP 'spec_version:\s*"?\K([0-9]+\.[0-9]+\.[0-9]+|dev)(?="?\s*$)' "$example" || true)

            if [ "$actual" != "$VERSION" ]; then
              echo "✗ $name: spec_version is '$actual', expected '$VERSION'"
              ERRORS=$((ERRORS + 1))
            fi
          done

          if [ "$ERRORS" -gt 0 ]; then
            echo ""
            echo "Run './scripts/bump-version.sh' to fix."
            exit 1
          fi

          echo "✓ All examples match VERSION $VERSION"
