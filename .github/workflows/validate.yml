name: Validate YAML

on:
  pull_request:
  push:
    branches:
      - main
    paths:
      - "schemas/**"
      - "**.yaml"
      - "**.yml"

jobs:
  yamllint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint YAML files
        run: |
          FILES=$(find . -name "*.yml" -o -name "*.yaml" | grep -v "^./.git/" | grep -v "^./site/")
          if [ -n "$FILES" ]; then
            echo "$FILES" | xargs yamllint -d relaxed
          fi
