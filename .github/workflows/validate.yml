name: Validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  shacl-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate ontology and shapes parse correctly
        run: |
          python3 -c "
          from rdflib import Graph
          from pathlib import Path
          g = Graph()
          for f in Path('ontology').glob('*.ttl'):
              g.parse(str(f), format='turtle')
              print(f'  {f}: OK')
          for f in sorted(Path('shapes').rglob('*.ttl')):
              g.parse(str(f), format='turtle')
              print(f'  {f}: OK')
          print(f'Total triples: {len(g)}')
          "

      - name: Validate examples against SHACL shapes
        run: python3 scripts/validate.py

  version-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify example specVersions match VERSION
        run: |
          VERSION=$(tr -d '[:space:]' < VERSION)
          echo "Expected version: $VERSION"
          ERRORS=0

          for example in examples/*/story.jsonld; do
            name=$(echo "$example" | cut -d/ -f2)
            actual=$(python3 -c "import json; print(json.load(open('$example')).get('specVersion', ''))" 2>/dev/null || true)

            if [ "$actual" != "$VERSION" ]; then
              echo "✗ $name: specVersion is '$actual', expected '$VERSION'"
              ERRORS=$((ERRORS + 1))
            fi
          done

          if [ "$ERRORS" -gt 0 ]; then
            echo ""
            echo "Run './scripts/bump-version.sh' to fix."
            exit 1
          fi

          echo "✓ All examples match VERSION $VERSION"
