name: Validate

on:
  pull_request:
  push:
    branches:
      - main
    paths:
      - "schemas/**"
      - "**.yaml"
      - "**.yml"
      - "VERSION"

jobs:
  yamllint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint YAML files
        run: |
          FILES=$(find . -name "*.yml" -o -name "*.yaml" | grep -v "^./.git/" | grep -v "^./site/")
          if [ -n "$FILES" ]; then
            echo "$FILES" | xargs yamllint
          fi

  version-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify schema versions match VERSION
        run: |
          VERSION=$(tr -d '[:space:]' < VERSION)
          echo "Expected version: $VERSION"
          ERRORS=0

          for schema in schemas/*.schema.yaml; do
            name=$(basename "$schema")

            # Check header comment
            if ! grep -q "^# Spec Version: ${VERSION}$" "$schema"; then
              echo "✗ $name: header comment does not match VERSION"
              ERRORS=$((ERRORS + 1))
            fi

            # Check $schema URL
            if ! grep -q "story-as-code\.dev/schemas/v${VERSION}/" "$schema"; then
              echo "✗ $name: \$schema URL does not match VERSION"
              ERRORS=$((ERRORS + 1))
            fi
          done

          if [ "$ERRORS" -gt 0 ]; then
            echo ""
            echo "Run './scripts/bump-version.sh' to fix."
            exit 1
          fi

          echo "✓ All schemas match VERSION $VERSION"
