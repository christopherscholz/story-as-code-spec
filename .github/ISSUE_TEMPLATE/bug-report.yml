name: Bug Report
description: Report an error or inconsistency in the spec or schemas
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What is wrong? Where in the spec or schema did you find the issue?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should be correct?
    validations:
      required: true
  - type: input
    id: location
    attributes:
      label: Location
      description: File and section where the issue occurs (e.g. schemas/node.schema.json, docs/spec.md#frames)
    validations:
      required: true
