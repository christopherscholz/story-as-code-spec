spec_version: "0.3.0"
name: "The Lighthouse Keeper's Secret"

settings:
  default_language: en

world:
  time_system:
    id: coastal-days
    name: "Coastal Calendar"
    type: LINEAR
    epoch: "Day 1"
    calendar:
      unit: day
      season: autumn

  nodes:
    # Characters
    - $ref: "./characters/mara.yaml"
    - $ref: "./characters/finn.yaml"
    - $ref: "./characters/elara.yaml"

    # Locations
    - $ref: "./locations/lighthouse.yaml"
    - $ref: "./locations/village.yaml"
    - $ref: "./locations/hidden-cave.yaml"

    # Objects
    - $ref: "./objects/old-journal.yaml"

    # Events
    - $ref: "./events/the-storm.yaml"
    - $ref: "./events/discovery.yaml"
    - $ref: "./events/revelation.yaml"

  edges:
    # --- Spatial ---
    - id: mara-at-lighthouse
      type: SPATIAL
      subtype: LOCATED_AT
      source: mara
      target: lighthouse
      valid_in:
        - from: "Day 1"

    - id: finn-at-village
      type: SPATIAL
      subtype: LOCATED_AT
      source: finn
      target: village

    - id: cave-adjacent-lighthouse
      type: SPATIAL
      subtype: ADJACENT_TO
      source: hidden-cave
      target: lighthouse
      directed: false

    # --- Relationships ---
    - id: mara-trusts-finn
      type: RELATIONSHIP
      subtype: TRUSTS
      source: mara
      target: finn
      properties:
        weight: 0.7
        emotional: { valence: 0.4, arousal: 0.2 }

    - id: mara-fears-elara
      type: RELATIONSHIP
      subtype: FEARS
      source: mara
      target: elara
      valid_in:
        - frame: main-timeline
          from: "Day 4"
          to: "Day 5"
      properties:
        weight: 0.5
        emotional: { valence: -0.4, arousal: 0.7 }
        cause: discovery

    # --- Actions ---
    - id: mara-finds-journal
      type: ACTION
      subtype: DISCOVERED
      source: mara
      target: old-journal
      valid_in:
        - frame: main-timeline
          from: "Day 4"
      properties:
        cause: the-storm

    - id: mara-gives-journal
      type: ACTION
      subtype: GAVE
      source: mara
      target: old-journal
      valid_in:
        - frame: main-timeline
          from: "Day 5"
      properties:
        result: revelation
        recipient: elara

    # --- Knowledge ---
    - id: mara-learns-cave
      type: KNOWLEDGE
      subtype: DISCOVERED
      source: mara
      target: hidden-cave
      valid_in:
        - frame: main-timeline
          from: "Day 4"
      properties:
        certainty: 1.0
      known_by: [mara]

    - id: mara-learns-truth
      type: KNOWLEDGE
      subtype: LEARNED
      source: mara
      target: elara
      valid_in:
        - frame: main-timeline
          from: "Day 5"
      properties:
        certainty: 0.9
      known_by: [mara, elara]

    # --- Relationships (post-revelation) ---
    - id: mara-trusts-elara
      type: RELATIONSHIP
      subtype: TRUSTS
      source: mara
      target: elara
      valid_in:
        - frame: main-timeline
          from: "Day 5"
      properties:
        weight: 0.6

  frames:
    - id: main-timeline
      name: "Main Timeline"
      description: "The canonical sequence of events"

    - id: what-if-no-storm
      name: "What If the Storm Never Came"
      description: "An alternate timeline where the storm doesn't happen and Mara never finds the cave"
      parent: main-timeline
      branches_at: "Day 3"

  constraints:
    - id: single-location
      name: "Characters occupy one location at a time"
      rule: >
        For any CHARACTER node at any given time point,
        at most one outgoing SPATIAL/LOCATED_AT edge may be active.
      severity: ERROR
      scope:
        node_types: [CHARACTER]
        edge_types: [SPATIAL]

    - id: journal-possession
      name: "Journal must have a holder"
      rule: >
        The node 'old-journal' must have at least one active
        ACTION/POSSESSES edge at every time point after Day 1.
      severity: WARNING
      scope:
        nodes: [old-journal]

narrative:
  lenses:
    - $ref: "./lenses/mara-pov.yaml"
    - $ref: "./lenses/omniscient.yaml"

  arcs:
    - $ref: "./arcs/main-arc.yaml"

  formats:
    - $ref: "./formats/short-story.yaml"

  variants:
    - type: CANON
      description: "The primary storyline — Mara discovers the cave and learns the truth"
      affects_frames: [main-timeline]

    - type: SPECULATIVE
      description: "What if the storm never came? Mara lives on, never knowing."
      affects_frames: [what-if-no-storm]
