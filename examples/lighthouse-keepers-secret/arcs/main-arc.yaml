id: main-arc
name: "The Keeper's Discovery"
milestones:
  - id: isolation
    position: "0.0-0.15"
    name: "Solitude at the Light"
    graph_conditions:
      - edge_exists:
          edge_id: mara-at-lighthouse
      - edge_not_exists:
          edge_id: mara-learns-cave
    emotional_target:
      valence: -0.2
      arousal: 0.2
    tension: LOW

  - id: storm-hits
    position: "0.15-0.35"
    name: "The Storm"
    graph_conditions:
      - node_state:
          node_id: the-storm
          frame: main-timeline
          at: "Day 3"
          properties:
            intensity: severe
    emotional_target:
      valence: -0.5
      arousal: 0.9
    tension: RISING
    depends_on: [isolation]

  - id: cave-found
    position: "0.35-0.55"
    name: "Into the Cave"
    graph_conditions:
      - edge_exists:
          edge_id: mara-finds-journal
      - edge_exists:
          edge_id: mara-learns-cave
    emotional_target:
      valence: 0.1
      arousal: 0.7
    tension: HIGH
    depends_on: [storm-hits]

  - id: stranger-arrives
    position: "0.55-0.75"
    name: "The Stranger"
    graph_conditions:
      - edge_exists:
          edge_id: mara-fears-elara
    emotional_target:
      valence: -0.3
      arousal: 0.8
    tension: MAXIMUM
    depends_on: [cave-found]

  - id: truth-revealed
    position: "0.75-1.0"
    name: "The Revelation"
    graph_conditions:
      - edge_exists:
          edge_id: mara-learns-truth
      - edge_exists:
          edge_id: mara-gives-journal
    emotional_target:
      valence: 0.5
      arousal: 0.4
    tension: RESOLVED
    depends_on: [stranger-arrives]
    generates:
      - edge:
          id: mara-trusts-elara
          type: RELATIONSHIP
          subtype: TRUSTS
          source: mara
          target: elara
          properties:
            weight: 0.6
