id: main-arc
name: "The Keeper's Discovery"
description: "Mara discovers a hidden cave and journal during a storm, leading to a revelation about the stranger Elara."

node_ids:
  - mara
  - elara
  - finn
  - lighthouse
  - village
  - hidden-cave
  - old-journal
  - the-storm
  - discovery
  - revelation

edge_ids:
  - mara-at-lighthouse
  - mara-trusts-finn
  - mara-fears-elara
  - mara-finds-journal
  - mara-gives-journal
  - mara-learns-cave
  - mara-learns-truth
  - cave-adjacent-lighthouse
  - mara-trusts-elara

beats:
  - id: isolation
    name: "Solitude at the Light"
    description: "Mara tends the lighthouse alone, her only contact being occasional visits from Finn."
    node_ids: [mara, finn, lighthouse, village]
    edge_ids: [mara-at-lighthouse, mara-trusts-finn]

  - id: storm-hits
    name: "The Storm"
    description: "A severe storm batters the coast, exposing the hidden cave near the lighthouse."
    node_ids: [mara, lighthouse, the-storm, hidden-cave]
    edge_ids: [mara-at-lighthouse, cave-adjacent-lighthouse]

  - id: cave-found
    name: "Into the Cave"
    description: "Mara explores the revealed cave and discovers an old journal inside."
    node_ids: [mara, hidden-cave, old-journal, discovery]
    edge_ids: [mara-finds-journal, mara-learns-cave]

  - id: stranger-arrives
    name: "The Stranger"
    description: "Elara appears, and Mara grows suspicious of her connection to the journal."
    node_ids: [mara, elara]
    edge_ids: [mara-fears-elara]

  - id: truth-revealed
    name: "The Revelation"
    description: "Mara confronts Elara with the journal, and the truth comes out."
    node_ids: [mara, elara, old-journal, revelation]
    edge_ids: [mara-learns-truth, mara-gives-journal, mara-trusts-elara]
