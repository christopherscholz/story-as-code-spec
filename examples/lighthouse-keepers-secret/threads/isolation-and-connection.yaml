id: isolation-and-connection
type: THEME
name: "Isolation vs. Connection"
description: >
  The tension between solitude and the need for human connection runs through the entire story,
  from Mara's self-imposed isolation to her eventual trust in Elara.

appearances:
  - beat_id: isolation
    description: "Mara's daily solitude at the lighthouse — isolation as comfort and habit"
  - beat_id: storm-hits
    description: "The storm as a force that breaks open Mara's closed world"
  - beat_id: stranger-arrives
    description: "Elara's arrival forces Mara to confront another person — connection as threat"
  - beat_id: truth-revealed
    description: "Trust and vulnerability replace fear — connection as resolution"
