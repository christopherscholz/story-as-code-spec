id: delorean
name: "DeLorean Time Machine"
type: OBJECT
description: >
  A modified 1981 DeLorean DMC-12 fitted with a flux capacitor. It requires 1.21 gigawatts
  of power and a speed of 88 miles per hour to activate time travel. Originally powered by
  stolen plutonium, the return trip is powered by a lightning strike.
properties:
  speed_threshold: "88 mph"
  power_requirement: "1.21 gigawatts"
tags: [sci-fi, iconic, vehicle, time-travel]
