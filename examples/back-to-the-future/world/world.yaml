frames:
  - id: original-1985
    name: "Original 1985"
    description: "The timeline Marty leaves — George is a pushover, Biff is his boss, the family is unhappy."

  - id: 1955-timeline
    name: "1955 Adventure"
    parent: original-1985
    branches_at: "1985-10-26"
    description: "Marty's time in 1955, where his actions alter the course of his parents' lives."
    relations:
      - target: original-1985
        type: BRANCHES_INTO
        at: "1985-10-26"

  - id: improved-1985
    name: "Improved 1985"
    parent: 1955-timeline
    branches_at: "1955-11-12"
    description: "The new timeline Marty returns to — George is a confident author, Lorraine is happy, Biff waxes their car."
    relations:
      - target: 1955-timeline
        type: BRANCHES_INTO
        at: "1955-11-12"

constraints:
  - id: temporal-existence-dependency
    name: "A person cannot exist in a time period where their birth has been prevented"
    description: >
      If a time traveller's actions in the past prevent their own birth,
      they progressively cease to exist. Any character whose causal chain
      of existence is broken cannot persist in any time period.
    severity: ERROR

  - id: flux-capacitor-threshold
    name: "Time travel requires 1.21 gigawatts and 88 mph"
    description: >
      The DeLorean can only traverse time when it reaches 88 mph and the
      flux capacitor is powered by exactly 1.21 gigawatts. Without both
      conditions met simultaneously, time travel does not occur.
    severity: ERROR
    scope:
      type: node
      item: delorean
