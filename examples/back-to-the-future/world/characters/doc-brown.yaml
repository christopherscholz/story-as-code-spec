# yaml-language-server: $schema=../../../../schemas/world/node.schema.json
id: doc-brown
name: "Dr. Emmett Brown"
type: CHARACTER
description: >
  An eccentric inventor and nuclear physicist who has spent thirty years and his family fortune
  trying to build a working time machine. In 1985 he finally succeeds, using a DeLorean and
  stolen plutonium. He is shot by Libyan terrorists moments after the first test, but his
  younger 1955 self — initially disbelieving — helps Marty harness a lightning strike to power
  the return trip. His friendship with Marty transcends decades.
properties:
  age: 65
  name_variants: ["Doc", "Dr. Brown", "the Doc"]
tags: [mentor, scientist, sci-fi]
