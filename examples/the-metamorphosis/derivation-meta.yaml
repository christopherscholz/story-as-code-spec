# yaml-language-server: $schema=../../schemas/derivation-meta.schema.json
id: novella-gregor-pov
lens: gregor-pov
format: novella
source_version: "0.4.0"

beat_position:
  beat: final-rejection

dependencies:
  nodes:
    - id: gregor
      must_exist: true
    - id: grete
      must_exist: true
    - id: father
      must_exist: true
    - id: mother
      must_exist: true
    - id: gregors-room
      must_exist: true
    - id: picture-frame
      must_exist: true

  edges:
    - id: gregor-confined-to-room
      must_exist: true
    - id: grete-cares-for-gregor
      must_exist: true
    - id: grete-rejects-gregor
      must_exist: true

  reveals:
    - node: gregor
      revealed_to: father
      at: "Day 1"
    - node: picture-frame
      revealed_to: gregor
      at: "Month 1"
