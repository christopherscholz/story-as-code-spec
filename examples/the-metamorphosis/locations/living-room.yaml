# yaml-language-server: $schema=../../../schemas/node.schema.json
id: living-room
name: "The Living Room"
type: LOCATION
description: >
  The central shared space of the Samsa apartment. Before the transformation it is the
  family's gathering place; afterward it becomes territory contested between family and
  lodgers. The lodgers eat here, Grete plays violin here, and it is here that Gregor's
  final emergence causes the crisis that ends his life. The room's function shifts from
  domestic comfort to boardinghouse dining room — a spatial measure of the family's loss
  of control over their own home.
properties:
  name_variants: ["the front room"]
tags: [domestic, contested-space]
