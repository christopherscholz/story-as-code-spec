id: gretes-ultimatum
name: "Grete's Ultimatum"
type: EVENT
description: >
  After the lodgers discover Gregor during the violin recital, Grete turns to her parents
  and declares: "It has to go. That's the only way, Father." She refuses to use Gregor's
  name, referring to the creature only as "it," and argues that they have done everything
  humanly possible. This is the moment the last family member who cared for Gregor
  formally renounces him — the final severance of his place in the household.
properties:
  name_variants: ["the declaration", "it has to go"]
  severity: 0.9
  participants: [grete, father, mother]
  location: living-room
tags: [turning-point, rejection]
