# yaml-language-server: $schema=../../schemas/story.schema.json
spec_version: "dev"
name: "The Metamorphosis"

settings:
  default_language: en

definitions:
  tags:
    # Narrative role
    - id: protagonist
      name: Protagonist
      description: "The central character whose inner life drives the narrative."
    - id: antagonist
      name: Antagonist
      description: "A character who opposes or obstructs the protagonist."
    - id: supporting
      name: Supporting Character
      description: "A character who aids or contrasts with the protagonist without driving the plot."
    - id: catalyst
      name: Catalyst
      description: "An element that triggers or accelerates change without being changed itself."
    - id: pov-character
      name: POV Character
      description: "The character through whose perception the story is filtered."

    # Social context
    - id: family
      name: Family
      description: "Related to the family unit and domestic bonds."
    - id: outsider
      name: Outsider
      description: "Someone outside the family circle who intrudes on the domestic space."
    - id: authority
      name: Authority
      description: "Represents institutional or patriarchal power."
    - id: group
      name: Group
      description: "A collective entity acting as one."

    # Character traits
    - id: caretaker
      name: Caretaker
      description: "A character who assumes responsibility for another's wellbeing."
    - id: sympathetic
      name: Sympathetic
      description: "A character who evokes the reader's compassion."
    - id: pragmatic
      name: Pragmatic
      description: "A character defined by practical, unsentimental action."

    # Thematic markers
    - id: symbol
      name: Symbol
      description: "An element carrying meaning beyond its literal function."
    - id: humanity
      name: Humanity
      description: "Related to the retention or loss of human identity."
    - id: identity
      name: Identity
      description: "Related to who a character is or becomes."
    - id: decay
      name: Decay
      description: "Physical or moral deterioration over time."
    - id: confinement
      name: Confinement
      description: "Restriction of movement or freedom."
    - id: violence
      name: Violence
      description: "Physical aggression or harm."
    - id: rejection
      name: Rejection
      description: "The act of casting someone or something out."
    - id: transformed
      name: Transformed
      description: "An entity that has undergone fundamental change."
    - id: supernatural
      name: Supernatural
      description: "Beyond natural explanation."

    # Object categories
    - id: instrument
      name: Instrument
      description: "A musical instrument."
    - id: clothing
      name: Clothing
      description: "A garment or wearable item."
    - id: decoration
      name: Decoration
      description: "An ornamental object."
    - id: weapon
      name: Weapon
      description: "An object used to inflict harm."

    # Spatial markers
    - id: domestic
      name: Domestic
      description: "Related to the household and private life."
    - id: family-space
      name: Family Space
      description: "A space belonging to and defined by the family."
    - id: contested-space
      name: Contested Space
      description: "A space whose control or meaning is disputed."

    # Plot structure
    - id: main-plot
      name: Main Plot
      description: "The primary storyline."
    - id: inciting-incident
      name: Inciting Incident
      description: "The event that sets the story in motion."
    - id: turning-point
      name: Turning Point
      description: "A moment that fundamentally redirects the narrative."
    - id: climax
      name: Climax
      description: "The point of highest tension or decisive confrontation."
    - id: escalation
      name: Escalation
      description: "An intensification of conflict or stakes."
    - id: exposure
      name: Exposure
      description: "A hidden truth or condition made visible."
    - id: resolution
      name: Resolution
      description: "The settling of the central conflict."

  types:
    # Node types
    - id: CHARACTER
      name: Character
      applies_to: NODE
      description: "A sentient being — human or transformed — that acts, speaks, or is acted upon."

    - id: LOCATION
      name: Location
      applies_to: NODE
      description: "A physical space where events unfold and characters exist."

    - id: OBJECT
      name: Object
      applies_to: NODE
      description: "A physical thing with symbolic or narrative significance."

    - id: EVENT
      name: Event
      applies_to: NODE
      description: "A discrete occurrence that changes the state of the world."

    # Edge types
    - id: SPATIAL
      name: Spatial Relationship
      applies_to: EDGE
      description: "A spatial or containment relationship (located-in, part-of, confined-to, embedded-in)."

    - id: OWNERSHIP
      name: Ownership
      applies_to: EDGE
      description: "A possession relationship between an owner and a thing."

    - id: SOCIAL
      name: Social Relationship
      applies_to: EDGE
      description: "A professional or institutional relationship (employed-by, supervised-by)."

    - id: RELATIONSHIP
      name: Interpersonal Relationship
      applies_to: EDGE
      description: "An emotional or interpersonal bond between characters or between a character and an object."

    - id: KNOWLEDGE
      name: Knowledge
      applies_to: EDGE
      description: "An information relationship — what one entity knows about another."

    # Device types
    - id: SETUP_PAYOFF
      name: Setup & Payoff
      applies_to: DEVICE
      description: "Something planted early that pays off later — the reader recognizes the callback."

    - id: CHEKHOV_GUN
      name: Chekhov's Gun
      applies_to: DEVICE
      description: "An element introduced early that must become significant later — if shown, it must fire."

    # Format types
    - id: NOVEL
      name: Novel
      applies_to: FORMAT
      description: "Long-form prose fiction structured in chapters and scenes."

    # Lens types
    - id: SIMPLE
      name: Simple Lens
      applies_to: LENS
      description: "A single, non-composite narrative perspective."

    # Thread types
    - id: THEME
      name: Theme
      applies_to: THREAD
      description: "An abstract idea that recurs across the narrative (e.g. alienation, duty, identity)."

    - id: MOTIF
      name: Motif
      applies_to: THREAD
      description: "A recurring symbolic element — image, object, or pattern — that reinforces thematic meaning."

world:
  time_system:
    id: samsa-timeline
    name: "Samsa Household Calendar"
    type: LINEAR
    calendar:
      unit: day
      season: winter

  nodes:
    # Characters
    - $ref: "./characters/gregor.yaml"
    - $ref: "./characters/grete.yaml"
    - $ref: "./characters/father.yaml"
    - $ref: "./characters/mother.yaml"
    - $ref: "./characters/chief-clerk.yaml"
    - $ref: "./characters/charwoman.yaml"
    - $ref: "./characters/lodgers.yaml"

    # Locations
    - $ref: "./locations/gregors-room.yaml"
    - $ref: "./locations/apartment.yaml"
    - $ref: "./locations/living-room.yaml"

    # Objects
    - $ref: "./objects/picture-frame.yaml"
    - $ref: "./objects/violin.yaml"
    - $ref: "./objects/apple.yaml"
    - $ref: "./objects/fathers-uniform.yaml"

    # Events
    - $ref: "./events/transformation.yaml"
    - $ref: "./events/chief-clerk-visit.yaml"
    - $ref: "./events/furniture-removal.yaml"
    - $ref: "./events/apple-attack.yaml"
    - $ref: "./events/violin-recital.yaml"
    - $ref: "./events/gretes-ultimatum.yaml"
    - $ref: "./events/gregors-death.yaml"

  edges:
    # --- Spatial ---
    - id: gregors-room-in-apartment
      type: SPATIAL
      name: part-of
      source: gregors-room
      target: apartment
      description: "Gregor's room is part of the apartment but effectively a separate world"

    - id: living-room-in-apartment
      type: SPATIAL
      name: part-of
      source: living-room
      target: apartment

    - id: gregor-confined-to-room
      type: SPATIAL
      name: confined-to
      source: gregor
      target: gregors-room

    - id: family-in-apartment
      type: SPATIAL
      name: resides-in
      source: father
      target: apartment
      description: "The family occupies the apartment, excluding Gregor's room"

    - id: picture-in-room
      type: SPATIAL
      name: located-in
      source: picture-frame
      target: gregors-room

    - id: apple-embedded-in-gregor
      type: SPATIAL
      name: embedded-in
      source: apple
      target: gregor
      description: "The apple lodges in Gregor's back and rots in place, never removed"
      valid_in:
        - from: "Month 1"

    - id: lodgers-in-apartment
      type: SPATIAL
      name: lodges-in
      source: lodgers
      target: apartment
      valid_in:
        - from: "Month 2"

    # --- Ownership ---
    - id: grete-owns-violin
      type: OWNERSHIP
      name: owns
      source: grete
      target: violin

    # --- Social ---
    - id: gregor-employed-by-firm
      type: SOCIAL
      name: employed-by
      source: gregor
      target: chief-clerk
      description: "Gregor works as a traveling salesman under the chief clerk's supervision to pay off his parents' debts"
      valid_in:
        - to: "Day 1"

    # --- Relationships ---
    - id: grete-cares-for-gregor
      type: RELATIONSHIP
      name: caretakes
      source: grete
      target: gregor
      valid_in:
        - to: "Month 3"
      weight: 0.8
      properties:
        motivation: guilt-and-duty

    - id: father-hostile-to-gregor
      type: RELATIONSHIP
      name: hostile-toward
      source: father
      target: gregor
      weight: 0.6
      properties:
        motivation: shame-and-authority

    - id: mother-pity-for-gregor
      type: RELATIONSHIP
      name: sympathizes-with
      source: mother
      target: gregor
      weight: 0.5
      properties:
        motivation: maternal-grief

    - id: grete-rejects-gregor
      type: RELATIONSHIP
      name: rejects
      source: grete
      target: gregor
      valid_in:
        - from: "Month 3"
      weight: 0.9
      properties:
        cause: exhaustion-and-disgust

    - id: gregor-attached-to-violin
      type: RELATIONSHIP
      name: emotionally-attached-to
      source: gregor
      target: violin
      description: "Gregor associates the violin with Grete's talent and his unfulfilled plan to send her to the conservatory"
      weight: 0.7

    - id: lodgers-dominate-apartment
      type: RELATIONSHIP
      name: dominates
      source: lodgers
      target: living-room
      description: "The lodgers effectively take over the living room and dictate household standards"
      valid_in:
        - from: "Month 2"
      weight: 0.8

    - id: charwoman-tends-gregor
      type: RELATIONSHIP
      name: tends-to
      source: charwoman
      target: gregor
      description: "The charwoman handles Gregor without fear or sentiment, calling him 'old dung beetle'"
      valid_in:
        - from: "Month 3"

    - id: father-wears-uniform
      type: RELATIONSHIP
      name: identified-with
      source: father
      target: fathers-uniform
      description: "Father sleeps in his uniform and refuses to take it off — the uniform becomes his new identity"
      valid_in:
        - from: "Month 1"

    # --- Knowledge ---
    - id: family-knows-transformation
      type: KNOWLEDGE
      name: knows-about
      source: father
      target: gregor
      description: "All family members and the chief clerk know about Gregor's insect form"

  constraints:
    - id: single-location
      name: "A character can only be in one place at a time"
      rule: >
        A character can only occupy one location at any given time.
      severity: ERROR
      scope:
        node_types: [CHARACTER]

narrative:
  lenses:
    - $ref: "./lenses/gregor-pov.yaml"
    - $ref: "./lenses/detached-observer.yaml"

  beats:
    - $ref: "./beats/main-storyline.yaml"
    - $ref: "./beats/awakening.yaml"
    - $ref: "./beats/failed-emergence.yaml"
    - $ref: "./beats/uneasy-coexistence.yaml"
    - $ref: "./beats/the-attack.yaml"
    - $ref: "./beats/the-decline.yaml"
    - $ref: "./beats/final-rejection.yaml"

  devices:
    - $ref: "./devices/picture-setup-payoff.yaml"
    - $ref: "./devices/apple-chekhov.yaml"
    - $ref: "./devices/violin-setup-payoff.yaml"

  threads:
    - $ref: "./threads/dehumanization.yaml"
    - $ref: "./threads/role-reversal.yaml"
    - $ref: "./threads/doors-and-barriers.yaml"

  formats:
    - $ref: "./formats/novella.yaml"

  variants:
    - type: CANON
      description: "The canonical story — Gregor transforms, declines, and dies; the family is liberated"
