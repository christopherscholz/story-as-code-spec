# yaml-language-server: $schema=../../schemas/story.schema.json
spec_version: "0.5.0"
name: "The Metamorphosis"

settings:
  default_language: en

world:
  time_system:
    id: samsa-timeline
    name: "Samsa Household Calendar"
    type: LINEAR
    calendar:
      unit: day
      season: winter

  nodes:
    # Characters
    - $ref: "./characters/gregor.yaml"
    - $ref: "./characters/grete.yaml"
    - $ref: "./characters/father.yaml"
    - $ref: "./characters/mother.yaml"
    - $ref: "./characters/chief-clerk.yaml"
    - $ref: "./characters/charwoman.yaml"
    - $ref: "./characters/lodgers.yaml"

    # Locations
    - $ref: "./locations/gregors-room.yaml"
    - $ref: "./locations/apartment.yaml"
    - $ref: "./locations/living-room.yaml"

    # Objects
    - $ref: "./objects/picture-frame.yaml"
    - $ref: "./objects/violin.yaml"
    - $ref: "./objects/apple.yaml"
    - $ref: "./objects/fathers-uniform.yaml"

    # Events
    - $ref: "./events/transformation.yaml"
    - $ref: "./events/chief-clerk-visit.yaml"
    - $ref: "./events/furniture-removal.yaml"
    - $ref: "./events/apple-attack.yaml"
    - $ref: "./events/violin-recital.yaml"
    - $ref: "./events/gretes-ultimatum.yaml"
    - $ref: "./events/gregors-death.yaml"

  edges:
    # --- Spatial ---
    - id: gregors-room-in-apartment
      type: SPATIAL
      name: part-of
      source: gregors-room
      target: apartment
      description: "Gregor's room is part of the apartment but effectively a separate world"

    - id: living-room-in-apartment
      type: SPATIAL
      name: part-of
      source: living-room
      target: apartment

    - id: gregor-confined-to-room
      type: SPATIAL
      name: confined-to
      source: gregor
      target: gregors-room

    - id: family-in-apartment
      type: SPATIAL
      name: resides-in
      source: father
      target: apartment
      description: "The family occupies the apartment, excluding Gregor's room"

    - id: picture-in-room
      type: SPATIAL
      name: located-in
      source: picture-frame
      target: gregors-room

    - id: apple-embedded-in-gregor
      type: SPATIAL
      name: embedded-in
      source: apple
      target: gregor
      description: "The apple lodges in Gregor's back and rots in place, never removed"
      valid_in:
        - from: "Month 1"

    - id: lodgers-in-apartment
      type: SPATIAL
      name: lodges-in
      source: lodgers
      target: apartment
      valid_in:
        - from: "Month 2"

    # --- Ownership ---
    - id: grete-owns-violin
      type: OWNERSHIP
      name: owns
      source: grete
      target: violin

    # --- Social ---
    - id: gregor-employed-by-firm
      type: SOCIAL
      name: employed-by
      source: gregor
      target: chief-clerk
      description: "Gregor works as a traveling salesman under the chief clerk's supervision to pay off his parents' debts"
      valid_in:
        - to: "Day 1"

    # --- Relationships ---
    - id: grete-cares-for-gregor
      type: RELATIONSHIP
      name: caretakes
      source: grete
      target: gregor
      valid_in:
        - to: "Month 3"
      weight: 0.8
      properties:
        motivation: guilt-and-duty

    - id: father-hostile-to-gregor
      type: RELATIONSHIP
      name: hostile-toward
      source: father
      target: gregor
      weight: 0.6
      properties:
        motivation: shame-and-authority

    - id: mother-pity-for-gregor
      type: RELATIONSHIP
      name: sympathizes-with
      source: mother
      target: gregor
      weight: 0.5
      properties:
        motivation: maternal-grief

    - id: grete-rejects-gregor
      type: RELATIONSHIP
      name: rejects
      source: grete
      target: gregor
      valid_in:
        - from: "Month 3"
      weight: 0.9
      properties:
        cause: exhaustion-and-disgust

    - id: gregor-attached-to-violin
      type: RELATIONSHIP
      name: emotionally-attached-to
      source: gregor
      target: violin
      description: "Gregor associates the violin with Grete's talent and his unfulfilled plan to send her to the conservatory"
      weight: 0.7

    - id: lodgers-dominate-apartment
      type: RELATIONSHIP
      name: dominates
      source: lodgers
      target: living-room
      description: "The lodgers effectively take over the living room and dictate household standards"
      valid_in:
        - from: "Month 2"
      weight: 0.8

    - id: charwoman-tends-gregor
      type: RELATIONSHIP
      name: tends-to
      source: charwoman
      target: gregor
      description: "The charwoman handles Gregor without fear or sentiment, calling him 'old dung beetle'"
      valid_in:
        - from: "Month 3"

    - id: father-wears-uniform
      type: RELATIONSHIP
      name: identified-with
      source: father
      target: fathers-uniform
      description: "Father sleeps in his uniform and refuses to take it off — the uniform becomes his new identity"
      valid_in:
        - from: "Month 1"

    # --- Knowledge ---
    - id: family-knows-transformation
      type: KNOWLEDGE
      name: knows-about
      source: father
      target: gregor
      description: "All family members and the chief clerk know about Gregor's insect form"

  constraints:
    - id: single-location
      name: "A character can only be in one place at a time"
      rule: >
        A character can only occupy one location at any given time.
      severity: ERROR
      scope:
        node_types: [CHARACTER]

narrative:
  lenses:
    - $ref: "./lenses/gregor-pov.yaml"
    - $ref: "./lenses/detached-observer.yaml"

  beats:
    - $ref: "./beats/main-storyline.yaml"
    - $ref: "./beats/awakening.yaml"
    - $ref: "./beats/failed-emergence.yaml"
    - $ref: "./beats/uneasy-coexistence.yaml"
    - $ref: "./beats/the-attack.yaml"
    - $ref: "./beats/the-decline.yaml"
    - $ref: "./beats/final-rejection.yaml"

  devices:
    - $ref: "./devices/picture-setup-payoff.yaml"
    - $ref: "./devices/apple-chekhov.yaml"
    - $ref: "./devices/violin-setup-payoff.yaml"

  threads:
    - $ref: "./threads/dehumanization.yaml"
    - $ref: "./threads/role-reversal.yaml"
    - $ref: "./threads/doors-and-barriers.yaml"

  formats:
    - $ref: "./formats/novella.yaml"

  variants:
    - type: CANON
      description: "The canonical story — Gregor transforms, declines, and dies; the family is liberated"
