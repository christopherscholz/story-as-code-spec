site_name: Story as Code Spec
site_description: Declarative YAML specification for defining worlds as temporal graphs and deriving outputs from them
site_url: https://story-as-code.dev/
repo_url: https://github.com/christopherscholz/story-as-code-spec
repo_name: christopherscholz/story-as-code-spec
edit_uri: edit/main/

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
    - content.action.edit

plugins:
  - search
  - include-markdown
  - literate-nav

markdown_extensions:
  - tables
  - fenced_code
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Scope & Boundaries: scope.md
  - Schemas:
    - schemas/index.md
    - World: schemas/world.md
    - Node: schemas/node.md
    - Edge: schemas/edge.md
    - Frame: schemas/frame.md
    - Lens: schemas/lens.md
    - Format: schemas/format.md
    - Arc: schemas/arc.md
    - Constraint: schemas/constraint.md
    - Schema: schemas/schema.md
    - Core Types: schemas/core-types.md
    - Derivation Meta: schemas/derivation-meta.md
    - Variant Meta: schemas/variant-meta.md
  - Contributing: contributing.md
  - Code of Conduct: code-of-conduct.md
  - License: license.md

extra:
  version:
    provider: mike
    default:
      - latest
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/christopherscholz/story-as-code-spec
