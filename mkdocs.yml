site_name: Story as Code Spec
site_description: Declarative YAML specification for defining worlds as temporal graphs and deriving outputs from them
site_url: https://story-as-code.dev/
repo_url: https://github.com/christopherscholz/story-as-code-spec
repo_name: christopherscholz/story-as-code-spec
edit_uri: edit/main/

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections

    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
    - content.action.edit

plugins:
  - search
  - include-markdown
  - literate-nav

markdown_extensions:
  - tables
  - fenced_code
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Scope & Boundaries: scope.md
  - Schemas:
    - Overview: schemas/index.md
    - Story: schemas/story.md
    - World:
      - Overview: schemas/world.md
      - Time System: schemas/time-system.md
      - Node: schemas/node.md
      - Edge: schemas/edge.md
      - Frame: schemas/frame.md
      - Constraint: schemas/constraint.md
    - Narrative:
      - Overview: schemas/narrative.md
      - Lens: schemas/lens.md
      - Format: schemas/format.md
      - Beat: schemas/beat.md
      - Device: schemas/device.md
      - Thread: schemas/thread.md
      - Variant Meta: schemas/variant-meta.md
    - Definitions:
      - Overview: schemas/definitions.md
      - Tag: schemas/tag.md
      - Type: schemas/type.md
    - Derivation Meta: schemas/derivation-meta.md
  - Examples:
    - Overview: examples/index.md
    - "The Metamorphosis":
      - Overview: examples/generated/the-metamorphosis.md
      - "Interactive Graph": examples/graph.md
  - Contributing: contributing.md
  - Code of Conduct: code-of-conduct.md
  - License: license.md

extra_javascript:
  - assets/js/story-graph.js

extra_css:
  - assets/css/custom.css
  - assets/css/story-graph.css

extra:
  version:
    provider: mike
    default:
      - latest
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/christopherscholz/story-as-code-spec
