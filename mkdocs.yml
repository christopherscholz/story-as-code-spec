site_name: Story as Code Spec
site_description: Declarative YAML specification for defining fictional worlds as temporal graphs and deriving narratives from them
site_url: https://christopherscholz.github.io/story-as-code-spec/
repo_url: https://github.com/christopherscholz/story-as-code-spec
repo_name: christopherscholz/story-as-code-spec
edit_uri: edit/main/

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
    - content.action.edit

plugins:
  - search
  - include-markdown
  - schema_reader:
      include:
        - "schemas"

markdown_extensions:
  - tables
  - fenced_code
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Contributing: contributing.md
  - Code of Conduct: code-of-conduct.md
  - License: license.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/christopherscholz/story-as-code-spec
